<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#FFFFFF" rx="100"/>
  <defs>
    <!-- Project Timeline Gradients -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C9EFF"/>
      <stop offset="100%" stop-color="#7381FF"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5560FF"/>
      <stop offset="100%" stop-color="#4638E5"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A25A3"/>
      <stop offset="100%" stop-color="#2D198D"/>
    </linearGradient>
    
    <!-- Depth Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="10" dy="8" stdDeviation="12" flood-color="#221B6A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Top Roadmap Line -->
  <g filter="url(#shadow)">
    <rect x="90" y="140" width="210" height="64" rx="32" fill="url(#grad1)"/>
    <circle cx="122" cy="172" r="14" fill="#FFFFFF"/>
  </g>

  <!-- Middle Roadmap Line -->
  <g filter="url(#shadow)">
    <rect x="150" y="224" width="260" height="64" rx="32" fill="url(#grad2)"/>
    <circle cx="182" cy="256" r="14" fill="#FFFFFF"/>
  </g>

  <!-- Bottom Roadmap Line -->
  <g filter="url(#shadow)">
    <rect x="230" y="308" width="190" height="64" rx="32" fill="url(#grad3)"/>
    <circle cx="262" cy="340" r="14" fill="#FFFFFF"/>
  </g>
</svg>
